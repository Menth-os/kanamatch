<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Match Game</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Japanese Match Game</h1>
      <p class="subtitle">Match images with Japanese words in kana (and kanji).</p>
    </header>

    <main class="app-main">
      <!-- Start Screen -->
      <section id="start-screen" class="card active">
        <h2>Ready to play?</h2>
        <p>Choose a game mode and test your Japanese vocabulary.</p>

        <div class="mode-select">
          <button class="mode-btn" data-mode="single-choice">
            1 Image · 4 Answers
          </button>
          <button class="mode-btn" data-mode="drag-drop">
            4 Images · Drag &amp; Drop
          </button>
        </div>

        <button id="start-btn" class="primary-btn" disabled>
          Start Game
        </button>
      </section>

      <!-- Game Screen -->
      <section id="game-screen" class="card">
        <div class="game-header">
          <button id="back-btn" class="ghost-btn">&larr; Back</button>
          <div class="progress">
            Question <span id="question-number">1</span>/ <span id="question-total">10</span>
          </div>
        </div>

        <div id="game-area">
          <!-- Filled dynamically -->
        </div>

        <div class="controls">
          <button id="check-btn" class="primary-btn" disabled>Check</button>
          <button id="next-btn" class="secondary-btn" disabled>Next</button>
        </div>

        <div id="feedback" class="feedback"></div>
      </section>
    </main>

    <footer class="app-footer">
      <span>Made for learning Japanese · Demo data only</span>
    </footer>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
