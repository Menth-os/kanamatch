<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Match Game</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">

    <header class="app-header">
      <h1>Japanese Match Game</h1>

      <div class="lang-select">
        <select id="lang">
          <option value="en">English</option>
          <option value="de">Deutsch</option>
        </select>
      </div>
    </header>

    <main class="app-main">

      <!-- START SCREEN -->
      <section id="start-screen" class="card active">
        <h2 data-i18n="start_title">Ready to play?</h2>
        <p data-i18n="start_sub">Test your Japanese vocabulary.</p>

        <button id="start-normal" class="primary-btn" data-i18n="start_normal">
          Start
        </button>

        <button id="start-hard" class="secondary-btn" data-i18n="start_hard">
          Start Hard Mode (2 min)
        </button>
      </section>

      <!-- GAME SCREEN -->
      <section id="game-screen" class="card">
        <div class="game-header">
          <button id="back-btn" class="ghost-btn" data-i18n="back_btn">← Back</button>

          <div class="progress">
            <span data-i18n="question">Question</span>
            <span id="question-number">1</span> /
            <span id="question-total">10</span>
          </div>

          <div id="timer" class="timer hidden">02:00</div>
        </div>

        <div id="game-area"></div>

        <div class="controls">
          <button id="check-btn" class="primary-btn" disabled data-i18n="check">
            Check
          </button>
          <button id="next-btn" class="secondary-btn" disabled data-i18n="next">
            Next
          </button>
        </div>

        <div id="feedback" class="feedback"></div>
      </section>

      <!-- END SCREEN -->
      <section id="end-screen" class="card">
        <h2 data-i18n="end_title">Finished!</h2>
        <p><span data-i18n="correct">Correct:</span> <span id="correct-count">0</span></p>
        <p><span data-i18n="wrong">Wrong:</span> <span id="wrong-count">0</span></p>

        <button id="restart-btn" class="primary-btn" data-i18n="restart">
          Restart
        </button>
      </section>

    </main>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
